<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .mapboxgl-control-container { display: none !important; }
        
        #radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            margin-top: -150px;
            margin-left: -150px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, rgba(59, 130, 246, 0.05) 0%, rgba(59, 130, 246, 0.2) 80%, rgba(59, 130, 246, 0.6) 100%);
            animation: spin 1.5s linear infinite;
            border: 1px solid rgba(59, 130, 246, 0.4);
            pointer-events: none;
            z-index: 999;
            display: none;
        }

        .incident-marker {
            width: 24px;
            height: 24px;
            background: #ef4444;
            border-radius: 50%;
            border: 3px solid #7f1d1d;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 1);
            animation: pulse 1.5s infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="radar-sweep"></div>
    <script>
        // O token é recebido via queryString para não expor a chave no código bruto do GitHub
        const urlParams = new URLSearchParams(window.location.search);
        const mapboxToken = urlParams.get('token');
        
        mapboxgl.accessToken = mapboxToken;
        
        var map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', // O estilo escuro oficial do Mapbox
            center: [-46.633308, -23.55052], // [lng, lat]
            zoom: 15,
            pitch: 0,
            bearing: 0,
            interactive: true,
            projection: 'globe' // Ativa a renderização 3D top de linha do Mapbox
        });

        var incidentMarker = null;

        map.on('style.load', function() {
            // Atmosfera especial do Mapbox 3D
            map.setFog({
                'range': [-1, 2],
                'color': '#0f172a',
                'horizon-blend': 0.1
            });
            
            // Adicionando a camada obrigatória de Prédios 3D extrudados
            map.addLayer({
                'id': '3d-buildings',
                'source': 'composite',
                'source-layer': 'building',
                'filter': ['==', 'extrude', 'true'],
                'type': 'fill-extrusion',
                'minzoom': 14,
                'paint': {
                    'fill-extrusion-color': '#1e293b',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': ['get', 'min_height'],
                    'fill-extrusion-opacity': 0.8
                }
            });

            map.addSource('zone', {
                'type': 'geojson',
                'data': {
                    'type': 'Feature',
                    'geometry': {
                        'type': 'Point',
                        'coordinates': [-46.633308, -23.55052]
                    }
                }
            });

            map.addLayer({
                'id': 'zone-layer',
                'type': 'circle',
                'source': 'zone',
                'paint': {
                    'circle-radius': {
                        stops: [[10, 20], [15, 80], [20, 400]]
                    },
                    'circle-color': 'rgba(59, 130, 246, 0.2)',
                    'circle-stroke-width': 1,
                    'circle-stroke-color': 'rgba(59, 130, 246, 0.5)'
                }
            });
        });

        window.addEventListener("message", (event) => {
            const data = event.data;
            if (data && data.type === "CHANGE_MODE") {
                const mode = data.mode;
                const radar = document.getElementById('radar-sweep');
                
                if (mode === 'scanning') {
                    radar.style.display = 'block';
                    map.easeTo({
                        pitch: 65,
                        bearing: 90,
                        duration: 3000
                    });
                    if (incidentMarker) incidentMarker.remove();
                } else if (mode === 'analyzed') {
                    radar.style.display = 'none';
                    map.flyTo({
                        center: [-46.635, -23.5518],
                        zoom: 16,
                        pitch: 45,
                        bearing: -20,
                        duration: 1500
                    });
                    
                    if (!incidentMarker) {
                        var el = document.createElement('div');
                        el.className = 'incident-marker';
                        incidentMarker = new mapboxgl.Marker(el)
                            .setLngLat([-46.635, -23.5518])
                            .addTo(map);
                    } else {
                        incidentMarker.addTo(map);
                    }
                } else {
                    radar.style.display = 'none';
                    map.easeTo({
                        center: [-46.633308, -23.55052],
                        pitch: 0,
                        bearing: 0,
                        zoom: 15,
                        duration: 1000
                    });
                    if (incidentMarker) incidentMarker.remove();
                }
            }
        });
    </script>
</body>
</html>
